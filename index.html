<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Borker - Property Broker Management System">
  <meta name="theme-color" content="#2563eb">
  <title>Borker - Broker Management</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><path d='M25 70V40l25-15 25 15v30H55V50l-10-6-10 6v20H25z' fill='white'/></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="app"></div>
  <script src="js/store.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      const hash = window.location.hash.slice(1);
      const isLoggedIn = localStorage.getItem('borker_user_id');
      
      if (!hash || hash === 'login' || hash === 'signup') {
        if (isLoggedIn) {
          window.location.hash = 'dashboard';
          return;
        }
      }
      
      if (isLoggedIn && !hash) {
        window.location.hash = 'dashboard';
      } else if (!isLoggedIn && !hash) {
        window.location.href = 'landing.html';
      }
    });
  </script>
</body>
</html>
