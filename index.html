<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Borker - Property Broker Management System">
  <meta name="theme-color" content="#0f1419">
  <title>Borker - Broker Management</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2314b8a6'/><path d='M25 70V40l25-15 25 15v30H55V50l-10-6-10 6v20H25z' fill='white'/></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="app">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="auth-logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </div>
          <span class="auth-logo-text">Borker</span>
        </div>
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-subtitle">Sign in to manage your properties</p>
        <form class="auth-form" id="login-form">
          <div class="input-group">
            <label class="required">Email</label>
            <input type="email" class="input" name="email" placeholder="you@example.com" required>
          </div>
          <div class="input-group">
            <label class="required">Password</label>
            <input type="password" class="input" name="password" placeholder="Enter your password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
        </form>
        <div class="auth-footer">
          Don't have an account? <a href="#signup">Sign up</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
